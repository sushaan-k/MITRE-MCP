runtime: "npm"
package: "mitre-mcp"
version: "1.0.0"
installCommand: "npx mitre-mcp"
startCommand:
  type: "stdio"
  command: "npx"
  args: ["mitre-mcp", "start"]
  configSchema:
    type: "object"
    properties:
      apiKey:
        type: "string"
        description: "Optional API key for enhanced security"
        default: ""
      maxRequestsPerHour:
        type: "number"
        description: "Rate limit for requests per hour"
        default: 1000
        minimum: 1
        maximum: 10000
      logLevel:
        type: "string"
        description: "Logging level"
        enum: ["DEBUG", "INFO", "WARNING", "ERROR"]
        default: "INFO"
    required: []
  exampleConfig:
    apiKey: "optional-api-key"
    maxRequestsPerHour: 1000
    logLevel: "INFO"
